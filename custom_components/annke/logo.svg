<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="#1a1a2e"/>

  <!-- Camera body outer ring -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="#4a9eff" stroke-width="12"/>

  <!-- Camera lens outer -->
  <circle cx="256" cy="256" r="130" fill="#0d1b3e"/>
  <circle cx="256" cy="256" r="128" fill="none" stroke="#2d5fa6" stroke-width="4"/>

  <!-- Camera lens inner rings -->
  <circle cx="256" cy="256" r="100" fill="none" stroke="#4a9eff" stroke-width="3" opacity="0.6"/>
  <circle cx="256" cy="256" r="72" fill="#1a3a6e"/>
  <circle cx="256" cy="256" r="70" fill="none" stroke="#4a9eff" stroke-width="2" opacity="0.8"/>

  <!-- Lens highlight -->
  <circle cx="256" cy="256" r="50" fill="#0a2040"/>
  <circle cx="236" cy="236" r="14" fill="#4a9eff" opacity="0.25"/>
  <circle cx="232" cy="232" r="6" fill="white" opacity="0.5"/>

  <!-- NVR indicator bars (top) -->
  <rect x="100" y="90" width="8" height="28" rx="4" fill="#4a9eff" opacity="0.9"/>
  <rect x="116" y="80" width="8" height="38" rx="4" fill="#4a9eff" opacity="0.9"/>
  <rect x="132" y="88" width="8" height="30" rx="4" fill="#4a9eff" opacity="0.9"/>
  <rect x="148" y="84" width="8" height="34" rx="4" fill="#4a9eff" opacity="0.9"/>

  <!-- Record dot -->
  <circle cx="388" cy="108" r="16" fill="#e53935" opacity="0.95"/>
  <circle cx="388" cy="108" r="10" fill="#ff5252"/>

  <!-- Bottom label area -->
  <rect x="156" y="390" width="200" height="36" rx="8" fill="#0d1b3e" opacity="0.7"/>
  <text x="256" y="414" font-family="Arial, sans-serif" font-size="22" font-weight="700"
        text-anchor="middle" fill="#4a9eff" letter-spacing="4">ANNKE</text>
</svg>
